name: Release rh-sigstore-a2a

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build and publish (e.g. v1.0.1)"
        required: true
        type: string

permissions: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: |
          tag="${{ steps.ref.outputs.ref }}"
          version="${tag#refs/tags/v}"
          version="${version#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          tag_version="${{ steps.version.outputs.version }}"
          pkg_version=$(python -c "
          import re
          with open('sigstore_a2a/__init__.py') as f:
              match = re.search(r'__version__\s*=\s*\"([^\"]+)\"', f.read())
              print(match.group(1))
          ")
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag version (${tag_version}) does not match package version (${pkg_version})"
            exit 1
          fi

      - name: Set up Hatch
        uses: pypa/hatch@257e27e51a6a5616ed08a39a408a21c35c9931bc # install

      - name: Build artifacts
        run: hatch build

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 5

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rh-sigstore-a2a/${{ needs.build.outputs.version }}/
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
